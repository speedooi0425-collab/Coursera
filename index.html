<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <h2>About Me</h2>
            <img src="https://via.placeholder.com/150" alt="Professional headshot of the developer">
            <p>I am a developer focused on creating efficient and scalable solutions.</p>
        </section>

        <section id="projects">
            <h2>My Projects</h2>
            <div class="project-card">
                <h3>Inventory System</h3>
                <p>A C# based management tool.</p>
            </div>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>
            <button id="contactBtn">Show Email</button>
            <p id="emailDisplay" style="display:none;">contact@example.com</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Portfolio Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
